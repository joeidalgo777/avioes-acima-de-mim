<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✈️ Aviões Acima de Mim</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { 
      margin:0; padding:0; background:#000; color:#0ff; 
      font-family: Arial, sans-serif; overflow:hidden; 
    }
    #map { height:100vh; width:100vw; }
    .info {
      position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.9);
      padding: 15px 20px; border-radius: 10px; z-index: 1000; 
      border: 1px solid #0ff; max-width: 350px;
    }
    .error { color: #ff6666; }
    .success { color: #0f0; }
  </style>
</head>
<body>

  <div class="info">
    <strong>✈️ Aviões Acima de Mim</strong><br><br>
    <span id="status">Localização obtida! Buscando aviões...</span>
  </div>

  <div id="map"></div>

  <script>
    const statusEl = document.getElementById('status');

    async function updatePlanes(map, userLat, userLon) {
      try {
        // Usando uma API alternativa mais amigável com CORS (ADS-B Exchange)
        const res = await fetch(`https://adsbexchange.com/api/aircraft/?lat=${userLat}&lon=${userLon}&dist=80`);
        
        if (!res.ok) throw new Error("API indisponível");
        
        const data = await res.json();

        // Limpa aviões antigos
        map.eachLayer(layer => {
          if (layer.options && layer.options.icon) layer.remove();
        });

        let count = 0;

        if (data.ac && data.ac.length > 0) {
          data.ac.forEach(plane => {
            if (!plane.lat || !plane.lon) return;
            
            count++;
            const marker = L.marker([plane.lat, plane.lon], {
              icon: L.divIcon({ 
                className: 'plane', 
                html: '✈️', 
                iconSize: [32, 32] 
              })
            }).addTo(map);

            marker.bindPopup(`
              <b>${plane.call || plane.icao || 'Desconhecido'}</b><br>
              Altitude: ${plane.alt_b ? Math.round(plane.alt_b) + ' ft' : '?'}<br>
              Velocidade: ${plane.gs ? Math.round(plane.gs) + ' kt' : '?'}
            `);
          });
        }

        statusEl.innerHTML = `<span class="success">✅ ${count} aviões encontrados nas proximidades</span>`;

      } catch (e) {
        console.error(e);
        statusEl.innerHTML = `<span class="error">❌ Erro ao buscar aviões<br><small>Tente recarregar a página</small></span>`;
      }
    }

    function initMap(lat, lon) {
      const map = L.map('map', { zoomControl: true }).setView([lat, lon], 13);
      
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: ''
      }).addTo(map);

      // Marcador do usuário
      L.circleMarker([lat, lon], { color: '#0ff', radius: 12, fillOpacity: 0.7 })
       .addTo(map)
       .bindPopup("<b>Você está aqui</b>");

      // Primeira busca
      updatePlanes(map, lat, lon);
      
      // Atualiza a cada 12 segundos
      setInterval(() => updatePlanes(map, lat, lon), 12000);
    }

    // Pega localização
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => initMap(pos.coords.latitude, pos.coords.longitude),
        err => {
          statusEl.innerHTML = `<span class="error">Erro na localização (${err.code})</span>`;
        }
      );
    }
  </script>
</body>
</html>
