<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✈️ Aviões Acima de Mim</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin:0; padding:0; background:#000; color:#0ff; font-family:Arial; overflow:hidden; }
    #map { height:100vh; width:100vw; }
    .info {
      position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.75);
      padding: 12px 18px; border-radius: 10px; z-index: 1000; font-size: 15px;
      border: 1px solid #0ff;
    }
    .plane { font-size: 28px; text-shadow: 0 0 10px #0ff; }
  </style>
</head>
<body>

  <div class="info">
    <strong>✈️ Aviões próximos a você</strong><br>
    <span id="status">Obtendo sua localização...</span>
  </div>

  <div id="map"></div>

  <script>
    let map, planesLayer;

    function initMap(lat, lon) {
      map = L.map('map', { zoomControl: true }).setView([lat, lon], 14);
      
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

      L.circleMarker([lat, lon], { color: '#0ff', radius: 10, fillOpacity: 0.6 })
       .addTo(map).bindPopup("Você está aqui");

      planesLayer = L.layerGroup().addTo(map);
      updatePlanes(lat, lon);
      setInterval(() => updatePlanes(lat, lon), 8000);
    }

    async function updatePlanes(userLat, userLon) {
      const status = document.getElementById('status');
      try {
        const res = await fetch(`https://opensky-network.org/api/states/all?lamin=${userLat-0.5}&lomin=${userLon-0.5}&lamax=${userLat+0.5}&lomax=${userLon+0.5}`);
        const data = await res.json();

        planesLayer.clearLayers();

        if (!data.states || data.states.length === 0) {
          status.textContent = "Nenhum avião próximo no momento";
          return;
        }

        status.textContent = `${data.states.length} aviões próximos`;

        data.states.forEach(plane => {
          const [icao, callsign, , lon, lat, alt, vel, heading] = plane;
          if (!lat || !lon) return;

          const marker = L.marker([lat, lon], {
            icon: L.divIcon({ className: 'plane', html: '✈️', iconSize: [30,30] })
          }).addTo(planesLayer);

          marker.bindPopup(`<b>${callsign || icao}</b><br>Alt: ${alt ? Math.round(alt/0.3048)+"ft" : "?"}`);
          if (heading) marker._icon.style.transform = `rotate(${heading}deg)`;
        });
      } catch(e) {
        status.textContent = "Erro ao buscar aviões";
      }
    }

    // === Pedir localização ===
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => {
          initMap(pos.coords.latitude, pos.coords.longitude);
        },
        err => {
          document.getElementById('status').innerHTML = 
            `Erro ao obter localização.<br><small>${err.message}</small>`;
        }
      );
    } else {
      document.getElementById('status').textContent = "Seu navegador não suporta geolocalização.";
    }
  </script>
</body>
</html>
